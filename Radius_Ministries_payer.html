<!DOCTYPE html>
<html>








<head>
    <title>Radius - Prayer</title>








    <style>
        #header {
            height: 125px;
            background-color: #0011ff;
            margin-bottom: 30px;
            padding: 10px, 20px;
            text-align: center;
        }








        #header h2 {
            margin: 30px;
        }




        #header ul {
            list-style-type: none;
            /* removes bullets */
            margin: 10px 0;
            padding: 0;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
        }








        #header ul li {
            background: #ffffff;
            font-size: 12px;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        #header ul li:hover {
            background: #cfd3e6;
        }
        #centered {
        text-align: center;
        font-weight: bold;
        text-decoration: underline;
        }
        form {
        text-align: center;
        margin-bottom: 30px;
        }
        #praybrd {
        display: inline-block;
        vertical-align: top;
        width: 92vw;
        outline: 15px solid gold;
        border: 20px solid #FFD700; 
        box-shadow: 
        4px 4px 0px #145214,  
        -2px -2px 0px #4caf50; 
        padding:10px;
        white-space: normal;
        overflow-wrap: break-word;
        word-break: break-word;
        background: linear-gradient(145deg, #1f7a1f, #145214);
        margin: 10px;
        }
        .prayreq {
        padding: 10px;
        margin: 10px;
        border-radius: 6px;
        display: inline-block;
        white-space: normal;
        overflow-wrap: break-word;
       
        }
        #cornerit {
        width: 300px;
        height: 200px;
        background-color: grey;
        display: flex;
        justify-content: center;
        margin: 0 auto;
        }


     
        #footer {
            clear: both;
            margin-top: 10px;
            padding: 10px;
            padding: 10;
        }


        #circleit {
            width: 100px;
            height: 100px;
            background-color: blue;
            border-radius: 50%;
            justify-content: center;
            margin: 0 auto;
        }
        #footer h2 {
            text-align: center;
            clear: both;
            padding: 0;
        }
    </style>
</head>








<body>


     
    <div id="header">
        <h2>Radius Ministries</h2>
        <hr>
        <ul>
            <li><a href="index.html"> Home </a></li>
            <li><a href="Radius_Ministries_radius.html"> Radius </a></li>
            <li><a href="Radius_Ministries_Testimonies.html"> Testimonies </a></li>
            <li><a href="Radius_Ministries_payer.html"> Prayer </a></li>
        </ul>
    </div>
    <h4 id= "centered">Prayer is essential to the faith, take time to pray for others and submit your own prayer requests
    </h4>


    <form id="prayform" >
        <input type="text" id="myrequest" placeholder="Enter prayer request..." required />
        <button type="submit">Send your request</button>
    </form>


    <div id="praybrd"> </div>
    <div id="footer">
       <img src="imgs/midradlogo.png" alt="center radius banner" width="1000">
    <script>


        function getRandomLightColor() {
            const r = Math.floor(Math.random() * 156) + 100; // 100–255 (lighter colors)
            const g = Math.floor(Math.random() * 156) + 100;
            const b = Math.floor(Math.random() * 156) + 100;
            return `rgb(${r}, ${g}, ${b})`;
        }




        document.getElementById("prayform").addEventListener("submit", function(e) {
            e.preventDefault(); // stops page refresh
       
            const input = document.getElementById("myrequest");
            const text = input.value;
       
            if (text.trim() === "") return;
       
        // create new div
            const newDiv = document.createElement("div");
            newDiv.classList.add("prayreq");
            newDiv.textContent = text;


            newDiv.style.backgroundColor = getRandomLightColor();
       
        // add it to the board
            document.getElementById("praybrd").appendChild(newDiv);
       
        // clear input
            input.value = "";
        });
   
    </script>




</body>
</html>
